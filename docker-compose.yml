services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_NAME: ${APP_NAME:-SMCR Staff AI}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENVIRONMENT: ${ENVIRONMENT:-local-docker}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/local_context/smcr_staff_ai.db}
      VECTOR_STORE_BACKEND: ${VECTOR_STORE_BACKEND:-local-stub}
      LOCAL_CONTEXT_STORAGE_DIR: ${LOCAL_CONTEXT_STORAGE_DIR:-data/local_context}
      SESSION_HANDOFF_STORAGE_DIR: ${SESSION_HANDOFF_STORAGE_DIR:-data/local_context/session_handoffs}
      LOCAL_API_KEY: ${LOCAL_API_KEY:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-50000000}
      PUBLIC_SOURCE_ONLY: ${PUBLIC_SOURCE_ONLY:-true}
    ports:
      - "127.0.0.1:${LOCAL_BIND_PORT:-8000}:8000"
    volumes:
      - .:/app
      - smcr_local_context:/app/data/local_context

  postgres:
    image: postgres:16
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: smcr_staff_ai
      POSTGRES_USER: smcr_staff_ai
      POSTGRES_PASSWORD: local_dev_only
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  smcr_local_context:
  postgres_data:
