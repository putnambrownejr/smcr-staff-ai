name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests-and-types:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: 3.12
          enable-cache: true

      - name: Install
        run: uv sync --frozen --extra dev

      - name: Install Playwright browsers
        run: uv run --frozen playwright install chromium --with-deps

      - name: Start application server
        run: uv run --frozen uvicorn app.main:app --port 8000 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 1
          done

      - name: Run tests
        run: uv run --frozen pytest tests/ -q

      - name: Run type checks
        run: uv run --frozen mypy app tests

      - name: Lint ruff
        run: uv run --frozen ruff check .
